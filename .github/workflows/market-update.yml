name: Live Market Update

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'data.json'
      - 'archive/**'
      - 'index.html'
      - '.github/workflows/**'
  schedule:
    # CST 9:00-15:55 every 5min (UTC 1:00-7:55)
    - cron: '*/5 1-7 * * 1-5'
    # Weekend noon snapshot (CST Saturday 10:00 = UTC 2:00)
    - cron: '0 2 * * 6'
  workflow_dispatch:

jobs:
  update:
    runs-on: china
    defaults:
      run:
        shell: bash
    env:
      PYTHONUTF8: '1'
      LANG: zh_CN.UTF-8
    permissions:
      contents: write
    steps:
      - name: Checkout (via gh CLI)
        run: |
          rm -rf ./* .[!.]* ..?* 2>/dev/null || true
          gh repo clone tt123497/TTNB .

      - name: Setup Python deps
        run: |
          python -m pip install --upgrade pip --quiet || true
          python -m pip install mootdx requests pandas numpy openpyxl --quiet

      - name: Run unified update (a-stock-data 28 endpoints)
        run: python run_update.py

      - name: Discover sectors
        run: python .github/scripts/discover_sectors.py

      - name: Score sectors
        run: python .github/scripts/score_sectors.py

      - name: Build events + layout
        run: python .github/scripts/fetch_events.py

      - name: Commit and push
        run: |
          git config user.name "Sentinel Bot"
          git config user.email "bot@sentinel.local"
          git add data.json archive/ 2>/dev/null || git add data.json
          git diff --staged --quiet && exit 0
          for i in 1 2 3; do
            git commit -m "Update $(date '+%H:%M')"
            git pull --rebase origin main && git push origin main && exit 0
            git rebase --abort 2>/dev/null; git reset --soft HEAD~1 2>/dev/null
            sleep 3
          done
          echo "Push failed after retries"
