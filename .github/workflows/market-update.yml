name: Live Market Update

on:
  push:
    branches:
      - main
  schedule:
    # CST 9:00-15:55 every 5min (UTC 1:00-7:55), 1 cron entry — GitHub Actions has bugs with multi-cron + */step
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 1,2,3,4,5,6,7 * * 1-5'
    # Weekend noon snapshot (CST Saturday 10:00 = UTC 2:00)
    - cron: '0 2 * * 6,0'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch data
        run: python .github/scripts/fetch_data.py
      - name: Fetch news
        run: python .github/scripts/fetch_news.py
      - name: Discover sectors
        run: python .github/scripts/discover_sectors.py
      - name: Score sectors
        run: python .github/scripts/score_sectors.py
      - name: Build events + layout
        run: python .github/scripts/fetch_events.py
      - name: Commit and push
        run: |
          git config user.name "Sentinel Bot"
          git config user.email "bot@sentinel.local"
          git add data.json
          git diff --staged --quiet && exit 0
          for i in 1 2 3; do
            git commit -m "Update $(TZ='Asia/Shanghai' date '+%H:%M')"
            git pull --rebase origin main && git push origin main && exit 0
            git rebase --abort 2>/dev/null; git reset --soft HEAD~1 2>/dev/null
            sleep 3
          done
          echo "Push failed after retries"
