name: Live Market Update

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'data.json'
      - 'briefing-history.json'
      - 'archive/**'
      - 'index.html'
      - '.github/workflows/**'
  schedule:
    # CST 9:00-15:55 every 5min (UTC 1:00-7:55)
    - cron: '*/5 1-7 * * 1-5'
    # 7x24每5分钟兜底 (新闻全天更新)
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: china
    defaults:
      run:
        shell: bash
    env:
      PYTHONUTF8: '1'
      LANG: zh_CN.UTF-8
      GH_TOKEN: ${{ github.token }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Configure git
        run: |
          # 自托管runner: safe.directory可能用Windows路径设置, bash用Unix路径, 需重新设置
          git config --global --add safe.directory '*'
          cd "$GITHUB_WORKSPACE"
          git config user.name "Sentinel Bot"
          git config user.email "bot@sentinel.local"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/tt123497/TTNB.git"

      - name: Setup Python deps
        run: |
          # 全面查找Python (Windows自托管runner)
          PY_BIN=""
          # 方法1: which
          for cmd in python python3; do
            p=$(which $cmd 2>/dev/null) && PY_BIN="$p" && break
          done
          # 方法2: cmd.exe where (搜索Windows PATH)
          if [ -z "$PY_BIN" ]; then
            p=$(cmd.exe /c "where python" 2>/dev/null | tr -d '\r' | head -1)
            if [ -n "$p" ] && [ -f "$p" ]; then
              PY_BIN=$(echo "$p" | sed 's|\\|/|g; s|^C:|/c|i; s|^D:|/d|i')
            fi
          fi
          # 方法3: 搜索常见安装路径
          if [ -z "$PY_BIN" ]; then
            for p in /c/Python3*/python.exe \
                     "/c/Program Files/Python3"*/python.exe \
                     "/c/Users/Administrator/AppData/Local/Programs/Python/Python3"*/python.exe \
                     /c/ProgramData/Anaconda3/python.exe \
                     /c/ProgramData/miniconda3/python.exe \
                     /d/Python3*/python.exe \
                     /d/Anaconda3/python.exe; do
              if [ -f "$p" ]; then PY_BIN="$p"; break; fi
            done
          fi
          if [ -z "$PY_BIN" ]; then
            echo "ERROR: Python not found. Debugging:"
            echo "PATH=$PATH"
            cmd.exe /c "where python" 2>/dev/null | tr -d '\r' || echo "where: nothing"
            ls /c/Python3*/python.exe 2>/dev/null || echo "no /c/Python3*"
            ls "/c/Users/Administrator/AppData/Local/Programs/Python/Python3"*/python.exe 2>/dev/null || echo "no AppData Python"
            exit 1
          fi
          echo "$(dirname "$PY_BIN")" >> $GITHUB_PATH
          echo "Python found: $PY_BIN"
          "$PY_BIN" --version
          "$PY_BIN" -m pip install --upgrade pip --quiet || true
          "$PY_BIN" -m pip install mootdx requests pandas numpy openpyxl --quiet

      - name: Run unified update (a-stock-data 28 endpoints)
        run: python run_update.py

      - name: Discover sectors
        run: python .github/scripts/discover_sectors.py

      - name: Score sectors
        run: python .github/scripts/score_sectors.py

      - name: News backup (fetch_news.py)
        run: python .github/scripts/fetch_news.py

      - name: Build events + layout
        run: python .github/scripts/fetch_events.py

      - name: Commit and push
        run: |
          git add data.json briefing-history.json archive/ 2>/dev/null || git add data.json briefing-history.json 2>/dev/null || git add data.json
          git diff --staged --quiet && exit 0
          for i in 1 2 3; do
            git commit -m "Update $(date '+%H:%M')"
            git pull --rebase origin main && git push origin main && exit 0
            git rebase --abort 2>/dev/null; git reset --soft HEAD~1 2>/dev/null
            sleep 3
          done
          echo "Push failed after retries"
