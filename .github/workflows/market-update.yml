name: Live Market Update

on:
  push:
    branches:
      - main
  schedule:
    - cron: '*/5 1-7 * * 1-5'
    - cron: '0 2 * * 6,0'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch data
        run: python .github/scripts/fetch_data.py
      - name: Fetch news
        run: python .github/scripts/fetch_news.py
      - name: Discover sectors
        run: python .github/scripts/discover_sectors.py
      - name: Score sectors
        run: python .github/scripts/score_sectors.py
      - name: Commit and push
        run: |
          git config user.name "Sentinel Bot"
          git config user.email "bot@sentinel.local"
          git add data.json
          git diff --staged --quiet || (git commit -m "Update $(TZ='Asia/Shanghai' date '+%H:%M')" && git push)
