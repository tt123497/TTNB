name: 📰 每日简报

on:
  schedule:
    # 早盘后 (CST 10:02 = UTC 2:02) — staggered 2min to avoid race
    - cron: '2 2 * * 1-5'
    # 收盘后 (CST 15:32 = UTC 7:32) — staggered 2min to avoid race
    - cron: '32 7 * * 1-5'
  workflow_dispatch:

jobs:
  briefing:
    runs-on: china
    defaults:
      run:
        shell: bash
    env:
      PYTHONUTF8: '1'
      LANG: zh_CN.UTF-8
      GH_TOKEN: ${{ github.token }}
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
    permissions:
      contents: write
    steps:
      - name: Checkout (via gh CLI)
        run: |
          rm -rf ./* .[!.]* ..?* 2>/dev/null || true
          gh repo clone tt123497/TTNB .
      - name: Setup Python deps
        run: |
          PY_BIN=""
          for cmd in python python3; do
            p=$(which $cmd 2>/dev/null) && PY_BIN="$p" && break
          done
          if [ -z "$PY_BIN" ]; then
            p=$(cmd.exe /c "where python" 2>/dev/null | tr -d '\r' | head -1)
            if [ -n "$p" ] && [ -f "$p" ]; then
              PY_BIN=$(echo "$p" | sed 's|\\|/|g; s|^C:|/c|i; s|^D:|/d|i')
            fi
          fi
          if [ -z "$PY_BIN" ]; then
            for p in /c/Python3*/python.exe \
                     "/c/Program Files/Python3"*/python.exe \
                     "/c/Users/Administrator/AppData/Local/Programs/Python/Python3"*/python.exe \
                     /c/ProgramData/Anaconda3/python.exe \
                     /c/ProgramData/miniconda3/python.exe \
                     /d/Python3*/python.exe \
                     /d/Anaconda3/python.exe; do
              if [ -f "$p" ]; then PY_BIN="$p"; break; fi
            done
          fi
          if [ -z "$PY_BIN" ]; then echo "ERROR: Python not found"; exit 1; fi
          echo "$(dirname "$PY_BIN")" >> $GITHUB_PATH
          echo "Python: $PY_BIN"
          "$PY_BIN" -m pip install --upgrade pip --quiet || true
          "$PY_BIN" -m pip install mootdx pandas requests numpy openpyxl tushare --quiet

      - name: 统一数据更新
        run: python run_update.py

      - name: 刷新事件日历
        run: python .github/scripts/fetch_events.py

      - name: 生成简报
        run: python .github/scripts/build_briefing.py

      - name: 回测验证
        run: python .github/scripts/backtest.py

      - name: 提交简报
        run: |
          git config user.name "Sentinel Bot"
          git config user.email "bot@sentinel.local"
          git add data.json briefing-history.json archive/ 2>/dev/null || git add data.json briefing-history.json 2>/dev/null || git add data.json
          git diff --staged --quiet || (git commit -m "📰 $(date '+%H:%M') 简报更新" && git push)
