name: Live Market Update

on:
  push:
    branches: [main]
  schedule:
    - cron: '*/5 1-7 * * 1-5'
    - cron: '0 2 * * 6,0'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch market data
        run: python .github/scripts/fetch_data.py

      - name: Fetch news
        run: python .github/scripts/fetch_news.py

      - name: Discover hot sectors
        run: python .github/scripts/discover_sectors.py

      - name: Commit and push
        run: |
          git config user.name "Sentinel Bot"
          git config user.email "bot@sentinel.local"
          git add data.json
          git diff --staged --quiet || (git commit -m "Market update $(TZ='Asia/Shanghai' date '+%H:%M')" && git push)

      - name: Archive close data
        run: |
          HOUR=$(TZ='Asia/Shanghai' date +%H)
          if [ "$HOUR" = "15" ]; then
            mkdir -p archive
            DATE=$(TZ='Asia/Shanghai' date +%Y-%m-%d)
            cp data.json archive/$DATE.json
            python3 -c "
import json, os
files = sorted([f.replace('.json','') for f in os.listdir('archive') if f.endswith('.json') and f != 'index.json'], reverse=True)
with open('archive/index.json','w') as fh: json.dump(files, fh, ensure_ascii=False)
print(f'Index: {len(files)} archives')
"
            git add archive/
            git diff --staged --quiet || (git commit -m "Archive $DATE" && git push)
          fi
