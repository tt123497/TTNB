name: News Watch (1min)

on:
  schedule:
    # 每个交易分钟，但跳过 market-update 的 :00/:05/:10/:15/:20/:25/:30/:35/:40/:45/:50/:55
    # 在 :02/:07/:12/:17/:22/:27/:32/:37/:42/:47/:52/:57 运行
    - cron: '2,7,12,17,22,27,32,37,42,47,52,57 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: china
    defaults:
      run:
        shell: bash
    env:
      PYTHONUTF8: '1'
      LANG: zh_CN.UTF-8
    permissions:
      contents: write
    steps:
      - name: Checkout (via gh CLI)
        run: |
          rm -rf ./* .[!.]* ..?* 2>/dev/null || true
          gh repo clone tt123497/TTNB .

      - name: Fetch news only (4 data sources, HTTP only)
        run: python news_fetch_once.py

      - name: Commit and push
        run: |
          git config user.name "News Bot"
          git config user.email "news@sentinel.local"
          git add data.json
          git diff --staged --quiet && exit 0
          for i in 1 2 3; do
            git commit -m "news $(date '+%H:%M')"
            git pull --rebase origin main && git push origin main && exit 0
            git rebase --abort 2>/dev/null; git reset --soft HEAD~1 2>/dev/null
            sleep 3
          done
