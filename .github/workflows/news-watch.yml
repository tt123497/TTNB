name: News Watch (1min)

on:
  schedule:
    # 每5分钟, 仅交易日活跃时段 (CST 8:00-16:00, UTC 0-8)
    - cron: '*/5 0-8 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: china
    defaults:
      run:
        shell: bash
    env:
      PYTHONUTF8: '1'
      LANG: zh_CN.UTF-8
      GH_TOKEN: ${{ github.token }}
    permissions:
      contents: write
    steps:
      - name: Checkout (via gh CLI)
        run: |
          rm -rf ./* .[!.]* ..?* 2>/dev/null || true
          gh repo clone tt123497/TTNB .

      - name: Fetch news (HTTP only, stdlib)
        run: |
          PY_BIN=""
          for cmd in python python3; do
            p=$(which $cmd 2>/dev/null) && PY_BIN="$p" && break
          done
          if [ -z "$PY_BIN" ]; then
            p=$(cmd.exe /c "where python" 2>/dev/null | tr -d '\r' | head -1)
            if [ -n "$p" ] && [ -f "$p" ]; then
              PY_BIN=$(echo "$p" | sed 's|\\|/|g; s|^C:|/c|i; s|^D:|/d|i')
            fi
          fi
          if [ -z "$PY_BIN" ]; then echo "ERROR: Python not found"; exit 1; fi
          "$PY_BIN" news_fetch_once.py || true

      - name: Commit and push news.json
        run: |
          git config user.name "News Bot"
          git config user.email "news@sentinel.local"
          test -f news.json || exit 0
          git add news.json
          git diff --staged --quiet && exit 0
          for i in 1 2 3; do
            git commit -m "news $(date '+%H:%M')"
            git pull --rebase -X theirs origin main && git push origin main && exit 0
            git rebase --abort 2>/dev/null; git reset --soft HEAD~1 2>/dev/null
            sleep 3
          done
