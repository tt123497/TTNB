name: AI Sentinel

on:
  schedule:
    # CST 9:00-15:00 every hour (UTC 1:00-7:00), comma-separated — GitHub Actions hates multi-line crons
    - cron: '0 1,2,3,4,5,6,7 * * 1-5'
    # Saturday CST 10:00 (UTC 2:00)
    - cron: '0 2 * * 6'
  workflow_dispatch:

jobs:
  scan:
    runs-on: china
    defaults:
      run:
        shell: bash
    env:
      PYTHONUTF8: '1'
      LANG: zh_CN.UTF-8
    permissions:
      contents: write
    steps:
      - name: Checkout (via gh CLI)
        run: |
          rm -rf ./* .[!.]* ..?* 2>/dev/null || true
          gh repo clone tt123497/TTNB .
      - name: Setup Python deps
        run: |
          python -m pip install --upgrade pip --quiet || true
          python -m pip install mootdx pandas requests numpy openpyxl --quiet

      - name: 确保数据最新
        run: python .github/scripts/fetch_data.py

      - name: 抓取最新新闻
        run: python .github/scripts/fetch_news.py

      - name: 数据增强 (enrich/tierA/tierB)
        run: |
          python .github/scripts/fetch_enrich.py
          python .github/scripts/fetch_tierA.py
          python .github/scripts/fetch_tierB.py

      - name: AI 分析 + 生成简报
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python .github/scripts/sentinel_ai.py

      - name: 提交更新
        run: |
          git config user.name "Sentinel AI"
          git config user.email "ai@sentinel.local"
          git add data.json
          git diff --staged --quiet && exit 0
          for i in 1 2 3; do
            git commit -m "AI $(date '+%H:%M') sentinel"
            git pull --rebase origin main && git push origin main && exit 0
            git rebase --abort 2>/dev/null; git reset --soft HEAD~1 2>/dev/null
            sleep 5
          done
