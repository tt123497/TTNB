name: AI Sentinel

on:
  schedule:
    # CST 9:00-15:00 every hour (UTC 1:00-7:00), 仅交易日(周一~周五)
    - cron: '0 1,2,3,4,5,6,7 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: china
    defaults:
      run:
        shell: bash
    env:
      PYTHONUTF8: '1'
      LANG: zh_CN.UTF-8
      GH_TOKEN: ${{ github.token }}
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
    permissions:
      contents: write
    steps:
      - name: Checkout (via gh CLI)
        run: |
          rm -rf ./* .[!.]* ..?* 2>/dev/null || true
          gh repo clone tt123497/TTNB .
      - name: Setup Python deps
        run: |
          PY_BIN=""
          for cmd in python python3; do
            p=$(which $cmd 2>/dev/null) && PY_BIN="$p" && break
          done
          if [ -z "$PY_BIN" ]; then
            p=$(cmd.exe /c "where python" 2>/dev/null | tr -d '\r' | head -1)
            if [ -n "$p" ] && [ -f "$p" ]; then
              PY_BIN=$(echo "$p" | sed 's|\\|/|g; s|^C:|/c|i; s|^D:|/d|i')
            fi
          fi
          if [ -z "$PY_BIN" ]; then
            for p in /c/Python3*/python.exe \
                     "/c/Program Files/Python3"*/python.exe \
                     "/c/Users/Administrator/AppData/Local/Programs/Python/Python3"*/python.exe \
                     /c/ProgramData/Anaconda3/python.exe \
                     /c/ProgramData/miniconda3/python.exe \
                     /d/Python3*/python.exe \
                     /d/Anaconda3/python.exe; do
              if [ -f "$p" ]; then PY_BIN="$p"; break; fi
            done
          fi
          if [ -z "$PY_BIN" ]; then echo "ERROR: Python not found"; exit 1; fi
          echo "$(dirname "$PY_BIN")" >> $GITHUB_PATH
          echo "Python: $PY_BIN"
          "$PY_BIN" -m pip install --upgrade pip --quiet || true
          "$PY_BIN" -m pip install mootdx pandas requests numpy openpyxl tushare --quiet

      - name: 统一数据更新
        run: python run_update.py

      - name: AI 分析 + 生成简报
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python .github/scripts/sentinel_ai.py

      - name: 提交更新
        run: |
          git config user.name "Sentinel AI"
          git config user.email "ai@sentinel.local"
          git add data.json
          git diff --staged --quiet && exit 0
          for i in 1 2 3; do
            git commit -m "AI $(date '+%H:%M') sentinel"
            git pull --rebase --autostash -X theirs origin main && git push origin main && exit 0
            git rebase --abort 2>/dev/null; git reset --soft HEAD~1 2>/dev/null
            sleep 5
          done
